<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Area Clienti - RM Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Sblocca il layout ad altezza fissa per adattarsi perfettamente ad ogni schermo (Mobile e Desktop) */
        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .player-wrapper { 
            position: relative; 
            overflow: hidden; 
            background: #020204;
        }
        
        /* 🔒 GRID DI FILIGRANA RM STUDIO CON LOGHI DIAGONALI RIPETUTI */
        .watermark-pattern {
            position: absolute;
            inset: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 20px;
            pointer-events: none;
            z-index: 20;
            overflow: hidden;
            opacity: 0.12; /* Opacità per non disturbare la visione */
            user-select: none;
        }
        
        .watermark-logo {
            width: 130px;
            height: auto;
            transform: rotate(-30deg);
            filter: grayscale(100%) brightness(200%);
            will-change: transform;
        }

        /* Impedisce il download abusivo tramite i controlli del browser */
        video::-internal-media-controls-download-button { display:none !important; }
        video::-webkit-media-controls-enclosure { overflow:hidden !important; }
        video::-webkit-media-controls-panel { width: calc(100% + 30px) !important; }
        video::-webkit-media-controls-settings-button { display: none !important; }
        video::-webkit-media-controls-overflow-button { display: none !important; }
    </style>
</head>
<body class="bg-[#050508] text-gray-200 h-[100dvh] w-screen flex items-center justify-center p-3 md:p-6 overflow-hidden selection:bg-purple-600 selection:text-white">

    <!-- Card principale reattiva ad altezza bloccata -->
    <div class="w-full max-w-5xl h-full max-h-[96dvh] bg-[#0b0b0f] border border-gray-900 rounded-3xl p-5 md:p-8 shadow-2xl flex flex-col justify-between relative overflow-hidden">
        
        <!-- Header (Tutto disposto su un'unica riga con Logo RM Studio) -->
        <div class="shrink-0 flex flex-wrap items-center gap-3 mb-4 pb-4 border-b border-gray-900/60 w-full">
            <a href="https://rmstudio.app/" target="_blank" class="flex items-center">
                <img src="https://raw.githubusercontent.com/Rickym2025/mrstudio/main/public/loghi/logo_rm.png" alt="RM Studio Logo" class="h-8 w-auto">
            </a>
            <span id="badge" class="bg-purple-500/10 text-purple-400 text-[10px] font-black uppercase px-2.5 py-1 rounded-full border border-purple-500/20">Progetto</span>
            <h1 id="title" class="text-base md:text-lg font-black text-white tracking-tight">Caricamento in corso...</h1>
            <span class="text-gray-800 hidden md:inline">•</span>
            <p class="text-xs text-gray-500">
                Preparato per: <span class="text-purple-400 font-bold" id="client-name">...</span> 
                <span class="mx-1.5 text-gray-800">•</span> 
                Inviato il: <span class="text-gray-400" id="sent-date">--/--/----</span>
            </p>
        </div>

        <!-- Render Area Dinamica (Flessibile in altezza per evitare lo scroll dello schermo) -->
        <div class="player-wrapper flex-1 min-h-0 rounded-2xl bg-[#020204] mb-4 flex items-center justify-center border border-gray-900/60 overflow-hidden shadow-inner relative">
            
            <!-- WATERMARK CON LOGO IN DIAGONALE RIPETUTO -->
            <div id="watermark-layer" class="watermark-pattern"></div>

            <!-- 1. VIDEO PLAYER (Con accelerazione hardware attiva per Chrome) -->
            <video id="player-video" 
                   class="hidden w-full h-full object-contain rounded-2xl bg-black"
                   style="transform: translate3d(0,0,0); backface-visibility: hidden; will-change: transform;"
                   preload="auto" 
                   playsinline 
                   webkit-playsinline 
                   controls 
                   controlslist="nodownload" 
                   oncontextmenu="return false;">
                <source src="" type="video/mp4">
            </video>

            <!-- 2. CAROSELLO IMMAGINI -->
            <div id="player-carousel" class="hidden w-full h-full relative flex items-center justify-center bg-black">
                <img id="carousel-img" src="" class="w-full h-full object-contain select-none rounded-2xl" oncontextmenu="return false;">
                <button onclick="prevSlide()" class="absolute left-4 bg-black/60 hover:bg-black/95 p-3.5 rounded-full text-white z-50 transition-all active:scale-90"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                <button onclick="nextSlide()" class="absolute right-4 bg-black/60 hover:bg-black/95 p-3.5 rounded-full text-white z-50 transition-all active:scale-90"><i class="fa-solid fa-chevron-right text-xs"></i></button>
            </div>

            <!-- 3. HTML INTERATTIVO (IFRAME) -->
            <iframe id="player-html" class="hidden w-full h-full border-none rounded-2xl z-20 bg-black" src=""></iframe>

            <!-- 4. LINK ESTERNO / DEMO -->
            <div id="player-link" class="hidden text-center p-6 z-30">
                <div class="w-14 h-14 rounded-full bg-purple-500/10 border border-purple-500/20 flex items-center justify-center mx-auto mb-3">
                    <i class="fa-solid fa-arrow-up-right-from-square text-lg text-purple-400"></i>
                </div>
                <h3 class="text-white text-lg font-bold mb-1">Link Esterno / Demo</h3>
                <a id="external-link-btn" href="" target="_blank" class="inline-flex items-center gap-2 bg-[#121217] border border-gray-800 px-5 py-2.5 mt-3 rounded-xl text-xs font-bold hover:border-purple-500 transition-all">Apri Progetto</a>
            </div>
        </div>

        <!-- 🌌 ECOSISTEMA ORBITALE VISIBILE (RM Studio) - Appare per siti web e link esterni -->
        <div id="ecosystem-container" class="hidden shrink-0 mb-4 p-4 bg-zinc-950/40 border border-zinc-900 rounded-2xl flex flex-col md:flex-row items-center gap-4 justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-purple-400">
                    <i class="fa-solid fa-circle-nodes text-lg animate-pulse"></i>
                </div>
                <div class="text-left">
                    <h4 class="text-xs font-black text-white uppercase tracking-wider">Ecosistema Digitale Orbitale RM Studio</h4>
                    <p class="text-[11px] text-gray-400 mt-0.5">Espandi il tuo sito web con moduli di Intelligenza Artificiale e assistenti telefonici attivi H24.</p>
                </div>
            </div>
            
            <!-- Iframe Interattivo che ospita il file orbit-template.html (servito correttamente con raw.githack.com) -->
            <div class="w-full md:w-[320px] h-[160px] bg-[#020204] rounded-xl overflow-hidden border border-gray-900/60 relative">
                <iframe src="https://raw.githack.com/Rickym2025/mrstudio/main/public/orbit-template.html" class="w-full h-full border-none" loading="lazy"></iframe>
            </div>
        </div>

        <!-- Footer Actions con Pulsante di Sblocco/Download in Posizione Centrale e Gigante -->
        <div class="shrink-0 flex items-center justify-center pt-4 border-t border-gray-800/60">
            <button id="actionBtn" onclick="handleAction()" 
                    class="w-full sm:w-auto bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-black px-12 py-5 rounded-2xl text-base md:text-lg uppercase tracking-wider transition-all shadow-[0_0_25px_rgba(147,51,234,0.35)] hover:shadow-[0_0_35px_rgba(147,51,234,0.65)] flex items-center justify-center gap-3 animate-pulse">
                <!-- Il testo e l'icona del lucchetto vengono iniettati via JS -->
            </button>
        </div>
    </div>

    <script>
        // Sostituisci con le tue reali chiavi di Supabase
        const supabaseUrl = 'https://jhijfulhntlhcytbhcly.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoaWpmdWxobnRsaGN5dGJoY2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MzcxODcsImV4cCI6MjA5ODMxMzE4N30.z062NW4ApClll-XWHH2ufmcCleBRNHUUdKO6FiLa0TQ'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let videoData = null;
        let currentSlideIdx = 0;
        let imagesArray = [];

        // Genera dinamicamente la griglia di filigrana con i loghi RM Studio ruotati per coprire gli schermi
        const watermarkLayer = document.getElementById('watermark-layer');
        if (watermarkLayer) {
            for (let i = 0; i < 28; i++) {
                const img = document.createElement('img');
                img.src = "https://raw.githubusercontent.com/Rickym2025/mrstudio/main/public/loghi/logo_rm.png";
                img.className = "watermark-logo select-none";
                img.setAttribute('oncontextmenu', 'return false;');
                watermarkLayer.appendChild(img);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return alert("ID non valido");

            // Incrementa le visualizzazioni sul database in modo asincrono
            await supabaseClient.rpc('increment_views', { video_id: id });

            // Recupera dati del record
            const { data, error } = await supabaseClient.from('portal_videos').select('*').eq('id', id).single();
            if (error || !data) return alert("Contenuto non trovato");
            videoData = data;

            document.getElementById('title').innerText = data.title || "Il tuo Progetto";
            document.getElementById('badge').innerText = data.portal_type;
            document.getElementById('client-name').innerText = data.client_name || "Cliente";
            
            if (data.sent_at) {
                const dateObj = new Date(data.sent_at);
                document.getElementById('sent-date').innerText = dateObj.toLocaleDateString('it-IT') + ' alle ' + dateObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            } else {
                document.getElementById('sent-date').innerText = "Non ancora inviato";
            }
            
            // RENDERING DINAMICO PER TIPO
            if (data.portal_type === 'video') {
                const p = document.getElementById('player-video');
                p.src = data.content_url;
                p.classList.remove('hidden');
            } 
            else if (data.portal_type === 'carousel') {
                imagesArray = typeof data.carousel_images === 'string' ? JSON.parse(data.carousel_images) : data.carousel_images;
                if(imagesArray.length > 0) {
                    document.getElementById('carousel-img').src = imagesArray[0];
                    document.getElementById('player-carousel').classList.remove('hidden');
                }
            } 
            else if (data.portal_type === 'html') {
                const frame = document.getElementById('player-html');
                frame.src = data.content_url;
                frame.classList.remove('hidden');
                
                // Mostra il widget interattivo dell'Ecosistema
                document.getElementById('ecosystem-container').classList.remove('hidden');
            } 
            else if (data.portal_type === 'link') {
                document.getElementById('external-link-btn').href = data.content_url;
                document.getElementById('player-link').classList.remove('hidden');
                
                // Mostra l'Ecosistema anche per i link esterni / demo esterne
                document.getElementById('ecosystem-container').classList.remove('hidden');
            }

            // GESTIONE FORMATTAZIONE PREZZO DINAMICO SENZA .00
            const priceVal = parseFloat(data.price_euro);
            const formattedPrice = priceVal % 1 === 0 ? parseInt(priceVal) : priceVal.toFixed(2);

            // GESTIONE STATO PAGAMENTO / WATERMARK
            if (data.is_paid === true || data.is_paid === "true") {
                document.getElementById('watermark-layer').classList.add('hidden'); // Nasconde la griglia di filigrana
                
                const btn = document.getElementById('actionBtn');
                
                // Testo dinamico in base al tipo di progetto
                if (data.portal_type === 'html' || data.portal_type === 'link') {
                    btn.innerHTML = `<i class="fa-solid fa-globe"></i> Visita il Sito Web`;
                } else {
                    btn.innerHTML = `<i class="fa-solid fa-lock-open"></i> Scarica in HD`;
                }
                
                btn.className = "w-full sm:w-auto bg-green-600 hover:bg-green-500 text-white font-black px-12 py-5 rounded-2xl text-base md:text-lg uppercase tracking-wider transition-all shadow-[0_0_30px_rgba(34,197,94,0.3)] hover:shadow-[0_0_40px_rgba(34,197,94,0.6)] flex items-center justify-center gap-3";
                btn.classList.remove('animate-pulse'); // Rimuove pulsazione se pagato
            } else {
                // Se non pagato, mostra il pulsante di sblocco
                document.getElementById('actionBtn').innerHTML = `<i class="fa-solid fa-lock"></i> Sblocca Progetto €${formattedPrice}`;
            }
        });

        // Carosello Slide Navigator
        function nextSlide() {
            if (imagesArray.length === 0) return;
            currentSlideIdx = (currentSlideIdx + 1) % imagesArray.length;
            document.getElementById('carousel-img').src = imagesArray[currentSlideIdx];
        }

        function prevSlide() {
            if (imagesArray.length === 0) return;
            currentSlideIdx = (currentSlideIdx - 1 + imagesArray.length) % imagesArray.length;
            document.getElementById('carousel-img').src = imagesArray[currentSlideIdx];
        }

        async function handleAction() {
            if (videoData.is_paid === true || videoData.is_paid === "true") {
                if (videoData.portal_type === 'carousel') {
                    alert("Download delle immagini in corso...");
                    imagesArray.forEach((url, i) => {
                        const a = document.createElement('a'); a.href = url; a.download = `slide_${i + 1}.jpg`; a.click();
                    });
                } else {
                    window.open(videoData.content_url, '_blank');
                }
            } else {
                const btn = document.getElementById('actionBtn');
                const originalText = btn.innerHTML;
                
                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Generazione pagamento...`;

                try {
                    const res = await fetch('https://n8n.rmstudio.app/webhook/crea-sessione-stripe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            project_id: videoData.id,
                            email: videoData.client_email,
                            title: videoData.title,
                            price: parseFloat(videoData.price_euro),
                            origin: window.location.origin
                        })
                    });

                    if (!res.ok) throw new Error("Errore del server n8n");
                    const data = await res.json();
                    
                    if (data.url) {
                        window.location.href = data.url;
                    } else {
                        throw new Error("URL di pagamento non ricevuto");
                    }
                } catch (err) {
                    alert("Impossibile avviare il pagamento. Riprova più tardi.");
                    console.error(err);
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            }
        }
    </script>
</body>
</html>
